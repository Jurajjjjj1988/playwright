apiVersion: apps/v1
kind: Deployment
metadata:
  name: ulovdomov-tests
  namespace: default
  labels:
    app: ulovdomov-tests
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ulovdomov-tests
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ulovdomov-tests
    spec:
      containers:
        - name: ulovdomov-tests
          image: ulovdomov-tests:latest
          imagePullPolicy: Never
          resources:
            requests:
              memory: '512Mi'
              cpu: '500m'
            limits:
              memory: '2Gi'
              cpu: '1000m'
          env:
            - name: BASE_URL
              valueFrom:
                secretKeyRef:
                  name: ulovdomov-secrets
                  key: BASE_URL
            - name: TEST_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: ulovdomov-secrets
                  key: TEST_USER_EMAIL
            - name: TEST_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ulovdomov-secrets
                  key: TEST_USER_PASSWORD
          livenessProbe:
            exec:
              command:
                - node
                - --version
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - node
                - --version
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
