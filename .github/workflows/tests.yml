name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1-5' # Mon-Fri at 8:00 UTC

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create .env
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "TEST_USER_EMAIL=${{ secrets.TEST_USER_EMAIL }}" >> .env
          echo "TEST_USER_PASSWORD=${{ secrets.TEST_USER_PASSWORD }}" >> .env

      - name: Run tests
        run: npx playwright test --project=chromium

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \":red_circle: *E2E Tests Failed*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.event.head_commit.message }}\n*Author:* ${{ github.actor }}\n*Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on success (scheduled only)
        if: success() && github.event_name == 'schedule'
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \":large_green_circle: *E2E Tests Passed* (scheduled run)\n*Repo:* ${{ github.repository }}\"
            }" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
